<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Vishal ❤️</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#111,#2b1055);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
color:white;
text-align:center;
}

.card{
width:90%;
max-width:360px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(8px);
}

button{
padding:15px 40px;
border:none;
border-radius:40px;
font-size:20px;
margin:10px;
background:linear-gradient(90deg,#ff4da6,#8a5cff);
color:white;
cursor:pointer;
}

.heart{
position:absolute;
font-size:24px;
animation:fall 8s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px);}
100%{transform:translateY(100vh);}
}
</style>

</head>

<body>

<div id="app" class="card">

<h1>Hello Vishal ❤️</h1>

<p>I made something special just for you 🥹</p>

<button onclick="page2()">Begin 💖</button>

</div>

<script>

for(let i=0;i<25;i++){

let h=document.createElement("div");

h.innerHTML="❤️";

h.className="heart";

h.style.left=Math.random()*100+"%";

h.style.animationDuration=(4+Math.random()*6)+"s";

document.body.appendChild(h);

}

function page2(){

document.getElementById("app").innerHTML=`

<h1>Do You Love Lovely? ❤️</h1>

<button onclick="page3()">YES 💖</button>

<button id="no" onmouseover="run()">NO 💔</button>

`;

}

function run(){

let b=document.getElementById("no");

b.style.position="absolute";

b.style.left=Math.random()*250+"px";

b.style.top=Math.random()*500+"px";

}

function page3(){

document.getElementById("app").innerHTML=`

<h1>🥹❤️</h1>

<h2>I Love You Too ❤️</h2>

<p>Dear Vishal,<br><br>

Thank you for being in my life.<br>

You are my happiness.<br><br>

Forever Yours,<br>

<b>Lovely ❤️</b>

</p>

`;

}

</script>

</body>
  </html>
