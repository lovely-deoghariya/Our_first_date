<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Vishal ❤️</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#14001f,#42004d);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
text-align:center;
}

.card{
background:rgba(255,255,255,.08);
padding:30px;
border-radius:20px;
width:90%;
max-width:360px;
box-shadow:0 0 20px hotpink;
}

button{
padding:12px 30px;
font-size:20px;
margin:10px;
border:none;
border-radius:30px;
background:#ff4da6;
color:white;
cursor:pointer;
}

.heart{
position:absolute;
font-size:25px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px);}
100%{transform:translateY(110vh);}
}
</style>
</head>

<body>

<div id="box" class="card">

<h1>Hello Vishal ❤️</h1>

<p>I made this only for you 🥹</p>

<button onclick="page2()">Begin 💖</button>

</div>

<script>

for(let i=0;i<25;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"%";
h.style.animationDuration=(4+Math.random()*5)+"s";
document.body.appendChild(h);
}

function page2(){

document.getElementById("box").innerHTML=`

<h2>Do You Love Lovely? ❤️</h2>

<button onclick="page3()">YES 💖</button>

<button id="no" onmouseover="run()">NO 😜</button>

`;

}

function run(){

let b=document.getElementById("no");

b.style.position="absolute";

b.style.left=Math.random()*250+"px";

b.style.top=Math.random()*450+"px";

}

function page3(){

document.getElementById("box").innerHTML=`

<h2>🎁 Surprise 🎁</h2>

<p>Tap below ❤️</p>

<button onclick="page4()">Open Gift 🎁</button>

`;

}

function page4(){

document.getElementById("box").innerHTML=`

<h2>💌 Dear Vishal</h2>

<p>

Thank you for coming into my life ❤️<br><br>

You make my days brighter.<br>

You make me smile.<br><br>

No matter what happens,<br>

I will always care for you. ❤️<br><br>

<b>Forever Yours,<br>Lovely 🌹</b>

</p>

`;

}

</script>

</body>
</html>
