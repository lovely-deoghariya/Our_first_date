<!DOCTYPE html>
<html>
<head>
<title>For Vishal ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff4d8d,#7b2ff7);
color:white;
text-align:center;
}

button{
padding:15px 40px;
font-size:22px;
border:none;
border-radius:40px;
background:white;
color:#ff1493;
font-weight:bold;
}

.card{
padding:30px;
}
</style>

</head>

<body>

<div class="card">

<h1>Hello Vishal ❤️</h1>

<p>I made something special just for you 🥹</p>

<button onclick="next()">Begin 💖</button>

</div>

<script>

function next(){

document.body.innerHTML=`

<div class="card">

<h1>Do You Love Lovely? ❤️</h1>

<button onclick="yes()">YES 💖</button>

</div>

`;

}

function yes(){

document.body.innerHTML=`

<div class="card">

<h1>🥹❤️</h1>

<h2>I Love You So Much Vishal</h2>

<p>Forever Yours,<br><b>Lovely ❤️</b></p>

`;

}

</script>

</body>
  </html>
